name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [claude/windows-offline-app-install-okof14]

jobs:
  build-electron-windows:
    name: Build Electron NSIS installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Authenticate GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build SPA (offline desktop build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:3130
          VITE_SUPABASE_ANON_KEY: local-anon-key
          VITE_OFFLINE_MODE: 'true'

      - name: Bundle server
        run: npm run build:server

      - name: Fetch PostgREST (Windows x64)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vendor/postgrest
          asset_url=$(curl -sS https://api.github.com/repos/PostgREST/postgrest/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*windows[^"]*x64[^"]*\.zip"' \
            | head -1 \
            | sed -E 's/"browser_download_url": *"([^"]*)"/\1/')
          if [ -z "$asset_url" ]; then
            echo "Could not find a Windows x64 PostgREST release asset — check https://github.com/PostgREST/postgrest/releases and adjust this step's asset-matching pattern." >&2
            exit 1
          fi
          echo "Downloading $asset_url"
          curl -sSL -o postgrest.zip "$asset_url"
          unzip -o postgrest.zip -d vendor/postgrest
          ls -la vendor/postgrest

      - name: Build NSIS installer
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchiOffice-Windows-installer
          path: release/*.exe
