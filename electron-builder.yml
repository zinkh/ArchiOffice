appId: com.archioffice.desktop
productName: ArchiOffice
directories:
  output: release
# The Express server is bundled into a single self-contained file by esbuild
# (dist-server/server.cjs), so it needs no node_modules of its own. But
# electron/main.cjs and electron/pgBootstrap.cjs are plain (unbundled) files
# that require('embedded-postgres') directly — that package resolves its own
# platform binary via a runtime `import('@embedded-postgres/<platform>')`
# (see node_modules/embedded-postgres/dist/binary.js), which a bundler can't
# safely inline, so node_modules must be shipped for real here. Neither
# embedded-postgres nor pg has a native .node addon needing an Electron ABI
# rebuild (embedded-postgres ships a plain OS executable), so npmRebuild stays off.
npmRebuild: false
# embedded-postgres isn't asar-aware: it resolves its own binary path via
# require/import relative to its own module location, which still resolves
# "inside" app.asar even when asarUnpack mirrors the files to
# app.asar.unpacked — Electron only rewrites that path transparently for
# fs reads, not for child_process.spawn(), so `initdb.exe`/`postgres.exe`
# fail with ENOENT (confirmed on real Windows). Disabling asar entirely
# avoids the whole path-mismatch class of bugs rather than trying to patch
# around it — this is an internal/offline tool, so the loose-files layout
# (no compression, no source hiding) costs nothing that matters here.
asar: false
files:
  - electron/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: dist
    to: dist
  - from: dist-server
    to: dist-server
  - from: proxy.json
    to: proxy.json
  # Fetched in CI (see .github/workflows/build-windows.yml) — PostgREST has no
  # npm-packaged binary and its GitHub-hosted releases aren't reachable from
  # this project's dev sandbox, so this directory only exists at CI build time.
  - from: vendor/postgrest
    to: postgrest
win:
  target:
    - target: nsis
      arch:
        - x64
  # public/favicon.ico only has 16x16/32x32 frames — Windows app icons need at
  # least 256x256, so this is a dedicated multi-resolution icon generated from
  # public/icon-512.png (via `npx png-to-ico public/icon-512.png`).
  icon: electron/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
